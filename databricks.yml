# databricks.yml
bundle:
  name: etl_pipeline_lab

workspace:
  host: https://adb-7405616314788964.4.azuredatabricks.net

resources:
  jobs:
    daily_etl_job:
      name: "[${bundle.target}] Daily ETL Pipeline"
      tasks:
        - task_key: extract_and_transform
          notebook_task:
            notebook_path: ./src/etl_notebook.py
      # job_clusters:
      #   - job_cluster_key: default_cluster
      #     new_cluster:
      #       spark_version: "11.3.x-scala2.12"
      #       node_type_id: "Standard_DS3_v2"
      #       num_workers: 2


targets:
  dev:
    default: true
    workspace:
      root_path: /Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
  prod:
    workspace:
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}